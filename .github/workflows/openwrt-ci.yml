
name: Build OpenWRT for SV3-26026
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1' # 每周一凌晨2点自动构建
    
env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_SH: diy.sh
  UPLOAD_BIN_DIR: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch python3 unzip zlib1g-dev libc6-dev-i386 subversion flex uglifyjs gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler g++-multilib antlr3 gperf wget ccache curl swig rsync
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone Source Code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        
    - name: Update Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_SH
        cd openwrt
        ../$DIY_SH

    - name: Download Package Sources
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      run: |
        cd openwrt
        echo -e "$(nproc) threads compilation started..."
        make -j$(nproc) || make -j1 V=s
        echo "Compile completed!"

    - name: Prepare Artifacts
      run: |
        cd openwrt
        mkdir -p ./artifact/firmware
        cp .config ./artifact/
        
        # Copy firmware images
        cp bin/targets/*/*/openwrt-*-x86-64-generic-squashfs-combined.img ./artifact/firmware/ 2>/dev/null || echo "No combined image found"
        cp bin/targets/*/*/openwrt-*-x86-64-generic-ext4-rootfs.img ./artifact/firmware/ 2>/dev/null || echo "No ext4 rootfs image found"
        
        # Generate checksums
        cd ./artifact/firmware
        md5sum *.img > md5sums.txt 2>/dev/null || echo "No images to hash"
        
    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: OpenWRT-SV326026-Firmware
        path: openwrt/artifact/

    - name: Release Firmware
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'workflow_dispatch' || github.repository == 'coolsnowwolf/lede'
      with:
        tag_name: sv326026-${{ env.TODAY }}
        files: |
          openwrt/artifact/firmware/*.img
          openwrt/artifact/.config
        body: |
          Automated build for信步SV3-26026 OpenWRT firmware
          Built on: $(date '+%Y-%m-%d %H:%M:%S')
          
          Includes:
          - Dual Gigabit Ethernet support (RTL8111E/F)
          - USB storage and serial support
          - PassWall, AdGuardHome, SQM QoS plugins
          - Optimized for Intel Atom N2600 platform
